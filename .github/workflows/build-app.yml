name: Build Pocket

on:
    workflow_dispatch:
        inputs:
            version_prefix:
                description: 'Version prefix (e.g. 1.0.0, 1.1.0, 2.0.0)'
                required: true
                default: '2.0.0'
            
            prerelease:
                description: 'Mark as pre-release'
                required: true
                default: 'true'
                type: choice
                options:
                    - 'true'
                    - 'false'

jobs:
    patch:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        outputs:
            VERSION: ${{ steps.version.outputs.VERSION }}
            VERSION_NUMBER: ${{ steps.version.outputs.VERSION_NUMBER }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
            
            -   name: Checkout custom
                uses: actions/checkout@v4
                with:
                    repository: anthony-hyo/pocket-patches
                    token: ${{ secrets.PATCHES_TOKEN }}
                    path: pocket-patches
            
            -   name: Set version
                id: version
                run: |
                    echo "VERSION=v${{ github.event.inputs.version_prefix }}" >> $GITHUB_OUTPUT
                    echo "VERSION_NUMBER=${{ github.event.inputs.version_prefix }}" >> $GITHUB_OUTPUT
                    echo "IS_PRERELEASE=${{ github.event.inputs.prerelease }}" >> $GITHUB_OUTPUT
            
            -   name: Setup Rust
                uses: dtolnay/rust-toolchain@stable
            
            -   name: Cache Rust dependencies
                uses: actions/cache@v4
                with:
                    path: |
                        ~/.cargo/registry
                        ~/.cargo/git
                        target
                    key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
            
            -   name: Setup Dlang
                uses: dlang-community/setup-dlang@v1
            
            -   name: Install Dependencies and Build RABCDAsm
                run: |
                    sudo apt-get update
                    sudo apt-get install -y wget unzip git curl liblzma-dev default-jdk
                    
                    git clone --depth 1 https://github.com/CyberShadow/RABCDAsm.git
                    cd RABCDAsm
                    dmd -run build_rabcdasm.d
                    sudo cp abcexport rabcdasm rabcasm abcreplace /usr/local/bin/
            
            -   name: Patch Game.swf
                run: cargo run --release
            
            -   name: Keystore
                run: |
                    echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > aqwpocket_keystore.jks
                    echo "${{ secrets.KEYSTORE_P12_BASE64 }}" | base64 -d > aqwpocket_keystore.p12
            
            -   name: Inject version
                run: |
                    sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ steps.version.outputs.VERSION_NUMBER }}</versionNumber>|" loader/Mobile-app.xml
                    sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ steps.version.outputs.VERSION_NUMBER }}</versionLabel>|" loader/Mobile-app.xml
                    sed -i "s|<versionNumber>.*</versionNumber>|<versionNumber>${{ steps.version.outputs.VERSION_NUMBER }}</versionNumber>|" loader/Desktop-app.xml
                    sed -i "s|<versionLabel>.*</versionLabel>|<versionLabel>${{ steps.version.outputs.VERSION_NUMBER }}</versionLabel>|" loader/Desktop-app.xml
            
            -   name: Upload patched files
                uses: actions/upload-artifact@v4
                with:
                    name: patched-files
                    path: |
                        loader/
                        aqwpocket_keystore.jks
                        aqwpocket_keystore.p12
    
    build-android:
        needs: patch
        runs-on: ubuntu-latest
        permissions:
            contents: write
        strategy:
            matrix:
                include:
                    -   architecture: "armv8"
                        render-mode: "auto"
                        suffix: ""
                    
                    -   architecture: "armv8"
                        render-mode: "direct"
                        suffix: "-direct"
                    
                    -   architecture: "armv8"
                        render-mode: "gpu"
                        suffix: "-gpu"
                    
                    -   architecture: "armv7"
                        render-mode: "auto"
                        suffix: ""
                    
                    -   architecture: "x64"
                        render-mode: "auto"
                        suffix: ""
                    
                    -   architecture: "x86"
                        render-mode: "auto"
                        suffix: ""
        
        steps:
            -   name: Download patched files
                uses: actions/download-artifact@v4
                with:
                    name: patched-files
            
            -   name: Setup AIR SDK
                uses: joshtynjala/setup-adobe-air-action@v2
                with:
                    air-version: "51.3"
                    accept-license: yes
            
            -   name: Build APK
                run: |
                    sed -i "s|<renderMode>.*</renderMode>|<renderMode>${{ matrix.render-mode }}</renderMode>|" loader/Mobile-app.xml
                    adt -package \
                      -target apk-captive-runtime \
                      -arch ${{ matrix.architecture }} \
                      -storetype JKS \
                      -keystore aqwpocket_keystore.jks \
                      -storepass ${{ secrets.KEYSTORE_PASS }} \
                      -keypass ${{ secrets.KEY_PASS }} \
                      AQWPocket-${{ needs.patch.outputs.VERSION }}-${{ matrix.architecture }}${{ matrix.suffix }}.apk \
                      loader/Mobile-app.xml \
                      -C loader \
                        Mobile.swf \
                        icons/icon-36x36.png \
                        icons/icon-48x48.png \
                        icons/icon-72x72.png \
                        icons/icon-96x96.png \
                        icons/icon-144x144.png \
                        icons/icon-192x192.png \
                        gamefiles/game.swf \
                        gamefiles/world-map.swf \
                        gamefiles/book-of-lore.swf
            
            -   name: Upload
                uses: actions/upload-artifact@v4
                with:
                    name: build-${{ matrix.architecture }}${{ matrix.suffix }}
                    path: "*.apk"
