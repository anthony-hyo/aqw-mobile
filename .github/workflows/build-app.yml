    publish:
#        needs: [patch, build-android, build-windows, build-macos, build-linux]
        needs: [patch, build-android]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        
        steps:
            -   name: Checkout
                uses: actions/checkout@v4
                
            -   name: Download builds
                uses: actions/download-artifact@v4
                with:
                    pattern: build-*
                    merge-multiple: true
            
            -   name: Release
                uses: softprops/action-gh-release@v2
                with:
                    tag_name: ${{ needs.patch.outputs.VERSION }}
                    name: ${{ needs.patch.outputs.VERSION }}${{ github.event.inputs.prerelease == 'true' && ' (test)' || '' }}
                    prerelease: ${{ github.event.inputs.prerelease }}
#                    body: |
#                        ## Which file should I download?
#                        
#                        ### Android
#                        
#                            * **armv8 (recommended)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv8.apk`
#                            → For most modern devices
#                        
#                            * **armv8-direct (alternative)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv8-direct.apk`
#                            → Use if the recommended version has issues
#                        
#                            * **armv8-gpu (legacy)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv8-gpu.apk`
#                            → Not recommended; fallback only
#                        
#                            * **armv7 (32-bit)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv7.apk`
#                            → For older devices only
#                        
#                        ---
#                        
#                        ### ChromeOS
#                        
#                        * `AQWPocket-${{ needs.patch.outputs.VERSION }}-x86.apk`
#                        * `AQWPocket-${{ needs.patch.outputs.VERSION }}-x64.apk`
#                        
#                        ---
#                        
#                        ### Windows
#                        
#                            * **x64 (recommended)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-windows-x64.zip`
#                        
#                            * **x64-direct (alternative)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-windows-x64-direct.zip`
#                        
#                            * **x86 (older systems)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-windows-x86.zip`
#                        
#                        ---
#                        
#                        ### macOS
#                        
#                            * **x64 (recommended)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-macos-x64.zip`
#                        
#                            * **x64-direct (alternative)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-macos-x64-direct.zip`
#                        
#                        ---
#                        
#                        ### Linux
#                        
#                            * **x64 (recommended)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-linux-x64.zip`
#                        
#                            * **x64-direct (alternative)**
#                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-linux-x64-direct.zip`
                    body: |
                        ## Which file should I download?
                        
                        ### Android
                        
                            * **armv8 (recommended)**
                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv8.apk`
                            → For most modern devices
                        
                            * **armv8-direct (alternative)**
                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv8-direct.apk`
                            → Use if the recommended version has issues
                        
                            * **armv8-gpu (legacy)**
                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv8-gpu.apk`
                            → Not recommended; fallback only
                        
                            * **armv7 (32-bit)**
                            `AQWPocket-${{ needs.patch.outputs.VERSION }}-armv7.apk`
                            → For older devices only
                        
                        ---
                        
                        ### ChromeOS
                        
                        * `AQWPocket-${{ needs.patch.outputs.VERSION }}-x86.apk`
                        * `AQWPocket-${{ needs.patch.outputs.VERSION }}-x64.apk`
                    files: |
                        *.apk
                        *.zip